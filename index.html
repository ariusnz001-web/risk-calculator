<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarius Risk Calc</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:15px;min-height:100vh}
.container{max-width:400px;margin:0 auto}
h1{color:#ffd700;text-align:center;font-size:1.3rem;margin-bottom:20px}
.card{background:rgba(255,255,255,.05);border-radius:12px;padding:15px;margin-bottom:12px;border:1px solid rgba(255,255,255,.1)}
label{display:block;font-size:.8rem;color:#aaa;margin-bottom:4px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);color:#fff;font-size:1rem;margin-bottom:10px}
button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#ffd700,#ffb700);color:#1a1a2e;font-weight:bold;font-size:1rem;cursor:pointer}
.result{background:rgba(0,0,0,.3);border-radius:8px;padding:12px;margin-top:12px;border-left:3px solid #ffd700}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.val{color:#ffd700;font-weight:bold}
.warn{color:#ff9999;font-size:.85rem;margin-top:10px;padding:10px;background:rgba(255,100,100,.1);border-radius:6px;border-left:3px solid #ff6464}
.ok{color:#99ff99;background:rgba(100,255,100,.1);border-left-color:#64ff64}
.hidden{display:none}
.f{text-align:center;margin-top:20px;font-size:.75rem;color:#888}
.f strong{color:#ffd700}
.direction-toggle{display:flex;gap:10px;margin-bottom:15px}
.dir-btn{flex:1;padding:12px;border:2px solid rgba(255,255,255,.2);border-radius:10px;background:rgba(0,0,0,.2);color:#fff;font-weight:bold;cursor:pointer;text-align:center;transition:all .3s}
.dir-btn.active.buy{background:rgba(0,200,100,.3);border-color:#00c864;color:#00ff88}
.dir-btn.active.sell{background:rgba(200,50,50,.3);border-color:#c83232;color:#ff6464}
.dir-label{font-size:1.2rem}
.dir-result{font-size:1.5rem;text-align:center;margin-bottom:10px}
.dir-result.buy{color:#00ff88}
.dir-result.sell{color:#ff6464}
</style>
</head>
<body>
<div class="container">
<h1>⚡️ Jarius Risk Calc</h1>
<div class="card">
<label style="color:#ffd700;margin-bottom:10px">📌 ARAH TRADE</label>
<div class="direction-toggle">
<button class="dir-btn buy" id="btnBuy" onclick="setDir('buy')">
<div class="dir-label">📈 BUY</div>
<small>Entry > SL</small>
</button>
<button class="dir-btn sell" id="btnSell" onclick="setDir('sell')">
<div class="dir-label">📉 SELL</div>
<small>Entry < SL</small>
</button>
</div>
<hr style="border:0;border-top:1px solid rgba(255,255,255,.1);margin:15px 0">
<label>Balance (USD)</label><input type="number" id="b" value="295">
<label>Risk %</label><input type="number" id="r" value="3">
<label>Pair</label><select id="p"><option value="gold">XAUUSD</option><option value="fx">Forex</option></select>
<label>Entry Price</label><input type="number" id="e" step="0.01">
<label>Stop Loss</label><input type="number" id="s" step="0.01">
