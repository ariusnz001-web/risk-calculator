<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarius Risk Calc</title>
<style>
body{font-family:system-ui;background:#1a1a2e;color:#fff;padding:10px;margin:0}
.c{max-width:360px;margin:0 auto}
h1{color:#ffd700;text-align:center;font-size:18px;margin:0 0 10px}
.box{background:rgba(255,255,255,.08);border-radius:8px;padding:10px;margin-bottom:8px}
label{font-size:12px;color:#aaa;display:block;margin:4px 0 2px}
input,select{width:100%;padding:6px;border-radius:5px;border:1px solid #444;background:#222;color:#fff;font-size:14px;box-sizing:border-box}
.btn{width:100%;padding:10px;border:none;border-radius:5px;background:#ffd700;color:#000;font-weight:bold;font-size:16px;cursor:pointer;margin-top:8px}
.res{background:rgba(0,0,0,.3);border-radius:5px;padding:8px;margin-top:8px;border-left:3px solid #ffd700;font-size:13px}
.r{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333}
.v{color:#ffd700;font-weight:bold}
.w{color:#f99;font-size:12px;margin-top:6px;padding:6px;background:rgba(255,0,0,.1);border-radius:4px;border-left:3px solid #f00}
.ok{color:#9f9;background:rgba(0,255,0,.1);border-left-color:#0f0}
.h{display:none}
.dir{display:flex;gap:8px;margin-bottom:8px}
.dir button{flex:1;padding:8px;border:2px solid #444;border-radius:5px;background:#222;color:#fff;font-weight:bold;cursor:pointer;font-size:14px}
.db{background:rgba(0,150,50,.3)!important;border-color:#0f0!important;color:#0f0!important}
.ds{background:rgba(150,30,30,.3)!important;border-color:#f00!important;color:#f00!important}
</style>
</head>
<body>
<div class="c">
<h1>⚡ Jarius Risk Calc</h1>
<div class="box">
<div class="dir">
<button class="db" id="b1" onclick="sd(1)">📈 BUY</button>
<button class="ds" id="b2" onclick="sd(2)">📉 SELL</button>
</div>
<label>Balance ($)</label><input type="number" id="n1" value="295">
<label>Risk (%)</label><input type="number" id="n2" value="3">
<label>Pair</label><select id="n3"><option value="gold">XAUUSD</option><option value="fx">Forex</option></select>
<label>Entry</label><input type="number" id="n4" step="0.01">
<label>Stop Loss</label><input type="number" id="n5" step="0.01">
<label>Take Profit</label><input type="number" id="n6" step="0.01">
<button class="btn" onclick="calc()">🔥 HITUNG</button>
<div id="res" class="h">
<div class="res">
<div class="r"><span>Arah</span><span class="v" id="o1">-</span></div>
<div class="r"><span>Risk $</span><span class="v" id="o2">$0</span></div>
<div class="r"><span>SL Dist</span><span class="v" id="o3">0</span></div>
<div class="r"><span>Lot</span><span class="v" id="o4">0</span></div>
<div class="r"><span>R:R</span><span class="v" id="o5">-</span></div>
</div>
<div id="msg" class="w h"></div>
</div>
</div>
</div>
<script>
let dir=1;
function sd(n){dir=n;document.getElementById('b1').className=n==1?'db':'ds';document.getElementById('b2').className=n==2?'db':'ds';}
function calc(){
var b=parseFloat(document.getElementById('n1').value)||0;
var r=parseFloat(document.getElementById('n2').value)||3;
var e=parseFloat(document.getElementById('n4').value)||0;
var s=parseFloat(document.getElementById('n5').value)||0;
var t=parseFloat(document.getElementById('n6').value)||0;
var p=document.getElementById('n3').value;
if(!b||!e||!s){alert('Isi Balance, Entry, SL');return}
var ok=(dir==1&&e>s)||(dir==2&&e<s);
if(!ok){alert(dir==1?'BUY: Entry > SL':'SELL: Entry < SL');return}
var ra=b*(r/100),dist=Math.abs(e-s),pts=p=='gold'?dist:dist*10000;
var lot=(ra/(pts*(p=='gold'?0.1:1))).toFixed(2);
if(lot<0.01)lot=0.01;if(lot>0.1)lot=0.1;
var rr='-';if(t){rr=(Math.abs(t-e)/dist).toFixed(2)+':1'}
document.getElementById('o1').textContent=dir==1?'📈 BUY':'📉 SELL';
document.getElementById('o2').textContent='$'+ra.toFixed(2);
document.getElementById('o3').textContent=pts.toFixed(1)+(p=='gold'?' pts':' pips');
document.getElementById('o4').textContent=lot;
document.getElementById('o5').textContent=rr;
document.getElementById('res').classList.remove('h');
var w=[],m=document.getElementById('msg');
if(r>3)w.push('⚠️ Risk >3%');
if(p=='gold'&&dist<5)w.push('⚠️ SL terlalu ketat');
if(rr!='-'&&parseFloat(rr)<1.5)w.push('⚠️ R:R < 1.5');
if(rr!='-'&&parseFloat(rr)>=2)w.push('✅ R:R bagus');
m.innerHTML=w.length>0?w.join('<br>'):'✅ Setup aman';
m.className='w '+(w.length==0||w[0][0]=='✅'?'ok':'');
m.classList.remove('h');
}
sd(1);
</script>
</body>
</html>
